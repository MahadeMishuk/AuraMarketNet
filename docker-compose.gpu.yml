version: "3.8"

services:
  auramarketnet:
    container_name: auramarketnet
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: auramarketnet:gpu
    restart: unless-stopped


    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]


    volumes:
      - /workspace/AuraMarketNet:/workspace/AuraMarketNet

    working_dir: /workspace/AuraMarketNet


    ports:
      - "8080:8080"


    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PORT=8080

    env_file:
      - path: .env
        required: false

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/model_status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
